name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter_ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter_ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Check Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Setup keystore for signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          KEYSTORE_PATH="${GITHUB_WORKSPACE}/frontend/android/app/upload-keystore.jks"
          echo "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          {
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
            echo "storeFile=$KEYSTORE_PATH"
            echo "storePassword=$STORE_PASSWORD"
          } > "${GITHUB_WORKSPACE}/frontend/android/key.properties"

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agrivora-release-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: agrivora-release-aab
          path: frontend/build/app/outputs/bundle/release/app-release.aab
